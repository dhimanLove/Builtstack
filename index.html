<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary -->
  <title>BuiltStack - Design & Engineering Studio</title>
  <meta name="description"
    content="BuiltStack is a design and engineering studio. We build web apps, mobile apps, SaaS platforms, and brand systems for founders, startups, and businesses." />
  <meta name="author" content="BuiltStack" />
  <meta name="theme-color" content="#080808" />
  <!-- Fallback / additional platform support -->
  <meta name="msapplication-TileColor" content="#080808" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://builtstack.co/" />
  <meta property="og:title" content="BuiltStack - Design & Engineering Studio" />
  <meta property="og:description"
    content="We build web apps, mobile apps, SaaS platforms, and brand systems for founders, startups, and businesses who care about quality." />
  <meta property="og:image" content="https://builtstack.co/og-image.png" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@BuiltStack" />
  <meta name="twitter:title" content="BuiltStack - Design & Engineering Studio" />
  <meta name="twitter:description"
    content="We build web apps, mobile apps, SaaS platforms, and brand systems for founders, startups, and businesses who care about quality." />
  <meta name="twitter:image" content="https://builtstack.co/og-image.png" />

  <!-- Organization structured data (fallback before JS) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "BuiltStack",
      "url": "https://builtstack.co",
      "logo": "https://builtstack.co/builtstack.png",
      "description": "BuiltStack is a design and engineering studio. We build web apps, mobile apps, SaaS platforms, and brand systems for founders, startups, and businesses.",
      "sameAs": [
        "https://twitter.com/BuiltStack",
        "https://www.linkedin.com/company/builtstack",
        "https://github.com/builtstack"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "email": "hello@builtstack.co",
        "availableLanguage": "English"
      }
    }
  </script>

  <!-- Google Fonts preconnect - eliminates font render delay -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
